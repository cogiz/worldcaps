<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Capital Quiz</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>

<style>
/* =========================
   MOBILE HARDENING
   ========================= */
body, html {
    /* Prevents text highlighting on rapid clicks */
    -webkit-user-select: none; 
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;

    /* Prevents double-tap-to-zoom and pinch-to-zoom */
    touch-action: manipulation; 

    /* Removes the ugly blue flash when tapping buttons on Android */
    -webkit-tap-highlight-color: transparent; 
}

/* Prevent images/SVGs from being dragged or saved on long-press */
img, svg {
    pointer-events: none; 
}
/* Re-enable pointer events ONLY for the paths we need to click */
svg path {
    pointer-events: auto;
}

/* =========================
   ORIGINAL STYLING
   ========================= */
body, html { 
    margin: 0; 
    padding: 0;
    background-color: black; 
    color: white;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden; 
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* THE GLOBE AREA */
#top-area {
    width: 100%;
    height: 45%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 20px;
}

/* THE CONTENT AREA */
#bottom-area {
    width: 100%;
    height: 55%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

h1 { 
    font-size: 48px; 
    color: #00FF00; 
    margin: 0 0 10px 0; 
    text-transform: uppercase;
}

p { 
    font-size: 22px; 
    line-height: 1.4; 
    max-width: 900px; 
    color: #cccccc;
    margin: 0 0 40px 0;
}

#start-btn {
    background-color: #00FF00; 
    color: #000000;            
    border: none;
    padding: 18px 60px;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    transition: 0.2s;
}

#start-btn:hover {
    background-color: #00cc00;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
}
</style>
</head>

<body>

<div id="top-area">
    <svg id="globe" width="800" height="400"></svg>
</div>

<div id="bottom-area">
    <h1>Welcome to WorldCaps</h1>

    <p>
        Challenge yourself across the regions of the World. Choose from a list of World regions and<br>
        try to identify the correct Capital city or Country from the options provided.<br>
        It is harder than you think. GOOD LUCK!
    </p>

    <button id="start-btn" onclick="startQuiz()">START</button>   

</div>

<script>
const width = 800;
const height = 400;

/* =========================
   GLOBE LOGIC (RESTORED)
   ========================= */
const projection = d3.geoOrthographic()
    .scale(180)
    .translate([width / 2, height / 2])
    .rotate([0, -15]);

const path = d3.geoPath().projection(projection);
const svg = d3.select("#globe");

svg.append("circle")
    .attr("fill", "#1a1a1a")
    .attr("cx", width / 2)
    .attr("cy", height / 2)
    .attr("r", projection.scale());

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json").then(data => {
    const land = topojson.feature(data, data.objects.land);

    const landPath = svg.append("path")
        .datum(land)
        .attr("d", path)
        .attr("fill", "#808080")
        .style("filter", "brightness(1.4)");

    d3.timer(() => {
        const rotate = projection.rotate();
        projection.rotate([rotate[0] + 0.12, rotate[1]]);
        landPath.attr("d", path);
    });
});

/* =========================
   IDIOT-PROOFED START LOGIC
   ========================= */
let isStarting = false; // State lock
const clickSound = new Audio("assets/audio/generic_click.mp3");
clickSound.preload = "auto";

function startQuiz() {
    if (isStarting) return; // Prevent double-execution
    isStarting = true;

    const btn = document.getElementById("start-btn");
    btn.disabled = true;
    btn.style.opacity = "0.5"; // Visual feedback

    // Reset audio to start so rapid clicks don't overlap
    clickSound.currentTime = 0;
    clickSound.play().catch(() => {});

    setTimeout(() => {
        window.location.href = "index.html";
    }, 500);
}
</script>
</body>
</html>
