<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff00;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    margin-top: 40px;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.subtitle {
    color: #999;
    margin-bottom: 30px;
}

#region-grid {
    display: grid;
    grid-template-columns: repeat(2, 300px);
    gap: 12px;
    margin-bottom: 40px;
}

.region-panel {
    background: #000;
    border: 1px solid #333;
    color: #ccc;
    padding: 15px;
    cursor: pointer;
    position: relative;
    transition: all 0.15s ease;
}

.region-panel:hover {
    border-color: #00ff00;
}

.region-panel.selected {
    background: #00ff00;
    color: #000;
}

.star {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: red;
    font-size: 20px;
    display: none;
}

.region-panel.completed .star {
    display: block;
}

#box-score {
    width: 620px;
    border: 1px solid #333;
    margin-bottom: 20px;
    cursor: pointer;
    user-select: none;
}

#box-score-header {
    padding: 15px;
    font-weight: bold;
    color: #00ff00;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#score-content {
    padding: 0 15px 15px 15px;
    display: block;
}

#box-score.collapsed #score-content {
    display: none;
}

/* NEW: Grand Master Text Styling */
#grand-master-text {
    display: none; /* Hidden by default */
    color: #00ff00;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
    text-align: center;
}

#region-screen {
    position: fixed;
    inset: 0;
    background: black;
}

#controlRow {
  width: 620px;
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.control-btn {
  flex: 1;
  padding: 12px;
  background: #222;
  border: 1px solid #444;
  border-radius: 6px;
  color: #eee;
  cursor: pointer;
}

.control-btn:hover {
  border-color: #00ff00;
  color: #00ff00;
}
</style>
</head>

<body>

<div id="menu-screen">

<h1>WORLDCAPS</h1>
<div class="subtitle">Select a region</div>

<div id="region-grid"></div>

<div id="box-score" class="collapsed">
    <div id="box-score-header">
        BOX SCORE <span id="box-toggle">▸</span>
    </div>
    <div id="score-content"></div>
</div>

<!-- NEW: Grand Master Text Element -->
<div id="grand-master-text">GRAND MASTER</div>

<div id="controlRow">
    <button id="reset-scores" class="control-btn">RESET BOX SCORE</button>
</div>

</div>

<div id="region-screen" style="display:none;">
    <iframe id="region-frame"
        style="width:100vw;height:100vh;border:none;background:black;"></iframe>
</div>

<script>

const REGIONS = [
{ name:"Australia", id:"australia", path:"regions/australia_region/index.html", total:8 },
{ name:"Canada", id:"canada", path:"regions/canada_region/index.html", total:13 },
{ name:"Caribbean", id:"caribbean", path:"regions/caribbean_region/index.html", total:19 },
{ name:"Asia", id:"asia", path:"regions/asia_region/index.html", total:28 },
{ name:"Africa", id:"africa", path:"regions/africa_region/index.html", total:50 },
{ name:"Central America", id:"central_america", path:"regions/central_america_region/index.html", total:8 },
{ name:"Europe", id:"europe", path:"regions/europe_region/index.html", total:44 },
{ name:"Middle East", id:"middle_east", path:"regions/middle_east_region/index.html", total:13 },
{ name:"South America", id:"south_america", path:"regions/south_america_region/index.html", total:12 },
{ name:"United States", id:"united_states", path:"regions/united_states_region/index.html", total:51 }
];

const regionGrid = document.getElementById("region-grid");
const scoreContent = document.getElementById("score-content");
const menuScreen = document.getElementById("menu-screen");
const regionScreen = document.getElementById("region-screen");
const regionFrame = document.getElementById("region-frame");

const boxScore = document.getElementById("box-score");
const boxToggle = document.getElementById("box-toggle");
const gmText = document.getElementById("grand-master-text");

const clickAudio = new Audio("assets/audio/generic_click.mp3");

function playClickSound() {
    clickAudio.currentTime = 0; 
    clickAudio.play().catch(()=>{});
}

let currentView = "menu";
let scores = loadScores();
let grandMasterTriggered = false;
let isTransitioning = false;

function loadScores() {
    const stored = localStorage.getItem("worldcaps_scores");
    let parsed = stored ? JSON.parse(stored) : null;
    const init = {};
    
    REGIONS.forEach(r => {
        let genScore = 0;
        let geniusScore = 0;
        
        // Safely migrate old save data to the new General/Genius format
        if (parsed && parsed[r.id]) {
            if (parsed[r.id].general !== undefined) {
                genScore = parsed[r.id].general;
                geniusScore = parsed[r.id].genius || 0;
            } else if (parsed[r.id].best !== undefined) {
                genScore = parsed[r.id].best; 
            }
        }
        init[r.id] = { general: genScore, genius: geniusScore, total: r.total };
    });
    
    localStorage.setItem("worldcaps_scores", JSON.stringify(init));
    return init;
}

function buildMenu() {
    regionGrid.innerHTML = "";

    REGIONS.forEach(region => {
        const panel = document.createElement("div");
        panel.className = "region-panel";

        let stars = "";
        // FEATURE 2: 2 Stars for Genius, 1 Star for General
        if (scores[region.id].genius === region.total) {
            panel.classList.add("completed");
            stars = "★★";
        } else if (scores[region.id].general === region.total) {
            panel.classList.add("completed");
            stars = "★";
        }

        panel.innerHTML = `${region.name}<span class="star" style="display:${stars ? 'block' : 'none'};">${stars}</span>`;

        panel.onclick = () => {
            if (isTransitioning) return; 
            isTransitioning = true;
            
            playClickSound();
            showRegion(region);

            setTimeout(() => { isTransitioning = false; }, 1000);
        };

        regionGrid.appendChild(panel);
    });
}

function buildBoxScore() {
    scoreContent.innerHTML = "";

    REGIONS.forEach(region => {
        const genScore = scores[region.id].general;
        const geniusScore = scores[region.id].genius;
        const total = region.total;
        
        const genPct = total ? Math.round(genScore / total * 100) : 0;
        const geniusPct = total ? Math.round(geniusScore / total * 100) : 0;

        const isGenPerfect = genPct === 100;
        const isGeniusPerfect = geniusPct === 100;

        // FEATURE 3: General Row
        const row1 = document.createElement("div");
        row1.style.display = "flex";
        row1.style.justifyContent = "space-between";
        row1.style.fontFamily = "monospace";
        row1.style.marginBottom = "4px";
        row1.innerHTML = `
            <span style="color:${isGenPerfect ? '#00ff00' : '#ffffff'};">${region.name.toUpperCase()} (GENERAL)</span>
            <span style="color:${isGenPerfect ? '#00ff00' : '#ffffff'};">${genPct}%</span>
        `;
        scoreContent.appendChild(row1);

        // FEATURE 3: Genius Row
        const row2 = document.createElement("div");
        row2.style.display = "flex";
        row2.style.justifyContent = "space-between";
        row2.style.fontFamily = "monospace";
        row2.style.marginBottom = "12px";
        row2.innerHTML = `
            <span style="color:${isGeniusPerfect ? '#00ff00' : '#999999'};">${region.name.toUpperCase()} (GENIUS)</span>
            <span style="color:${isGeniusPerfect ? '#00ff00' : '#999999'};">${geniusPct}%</span>
        `;
        scoreContent.appendChild(row2);
    });
}

function showMenu() {
    currentView = "menu";
    regionScreen.style.display = "none";
    menuScreen.style.display = "block";
    regionFrame.src = "";
}

function showRegion(region) {
    currentView = "region";
    menuScreen.style.display = "none";
    regionScreen.style.display = "block";
    
    // FEATURE 1: Pass the General completion status to the iframe via URL
    const isGeneralPerfect = scores[region.id].general === region.total;
    regionFrame.src = `${region.path}?generalPerfect=${isGeneralPerfect}`;
}

function updateGrandMasterDisplay() {
    const allPerfect = REGIONS.every(r => scores[r.id].genius === r.total);
    if (allPerfect && sessionStorage.getItem("grandMasterTriggered") === "1") {
        gmText.style.display = "block";
    } else {
        gmText.style.display = "none";
    }
}

function checkGrandMaster() {
    // Grand Master now requires GENIUS to be 100% on all regions
    const allPerfect = REGIONS.every(r => scores[r.id].genius === r.total);

    if (!allPerfect) return;
    if (grandMasterTriggered) return;
    if (sessionStorage.getItem("grandMasterTriggered")==="1") return;

    grandMasterTriggered = true;
    sessionStorage.setItem("grandMasterTriggered","1");

    setTimeout(() => {
        window.location.href = "grand_master_celebration.html";
    }, 600);
}

window.addEventListener("message", (event) => {
    if (event.origin !== window.location.origin) return;
    if (!event.data || event.data.type !== "REGION_COMPLETE") return;

    const { regionId, score, total, difficulty } = event.data;

    if (!scores[regionId]) return;

    const diffKey = difficulty || "general"; 
    scores[regionId][diffKey] = Math.max(scores[regionId][diffKey], score);
    scores[regionId].total = total;

    localStorage.setItem("worldcaps_scores", JSON.stringify(scores));

    buildMenu();
    buildBoxScore();

    setTimeout(() => {
        showMenu();
        checkGrandMaster();
    }, 3000);
});

boxScore.onclick = () => {
    playClickSound();
    boxScore.classList.toggle("collapsed");
    boxToggle.textContent = boxScore.classList.contains("collapsed") ? "▸" : "▾";
};

document.getElementById("reset-scores").onclick = (e) => {
    if (e.target.disabled) return;
    e.target.disabled = true; 

    playClickSound();
    localStorage.removeItem("worldcaps_scores");
    sessionStorage.removeItem("grandMasterTriggered");
    scores = loadScores();
    grandMasterTriggered = false;
    buildMenu();
    buildBoxScore();
    updateGrandMasterDisplay();

    setTimeout(() => { e.target.disabled = false; }, 1000);
};

buildMenu();
buildBoxScore();
updateGrandMasterDisplay();

</script>

</body>
</html>
